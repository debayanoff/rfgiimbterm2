<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <script>
        // Redirect to the new unified registration page
        const urlParams = new URLSearchParams(window.location.search);
        const plan = urlParams.get('plan');
        const target = plan ? `register.html?plan=${plan}` : 'register.html';
        window.location.href = target;
    </script>
</head>
<body>
    <p>Redirecting to the new registration page...</p>
</body>
</html>
