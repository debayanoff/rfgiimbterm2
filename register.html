<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join The Elite - RAW FITNESS GYM</title>
    <link rel="stylesheet" href="register.css">
    <script src="google-sheets.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Barlow:wght@400;500;600&family=Bebas+Neue&display=swap" rel="stylesheet">
</head>
<body>
    <div class="register-container">
        <div class="register-card">
            <div class="register-header">
                <h2>Join The Elite</h2>
                <p>Register and choose your membership to begin your transformation.</p>
            </div>

            <form id="registerForm" class="register-form">
                <!-- SECTION 1: ACCOUNT CREDENTIALS -->
                <div class="form-section-title">Account Credentials</div>
                
                <div class="input-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" placeholder="Enter your full name" required>
                </div>
                
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>

                <div class="row-group">
                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="Create a password" required>
                    </div>
                    <div class="input-group">
                        <label for="confirm-password">Confirm Password</label>
                        <input type="password" id="confirm-password" placeholder="Confirm password" required>
                    </div>
                </div>

                <!-- SECTION 2: PERSONAL DETAILS -->
                <div class="form-section-title">Personal Details</div>
                
                <div class="row-group">
                    <div class="input-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" required placeholder="10-digit mobile number">
                    </div>
                    <div class="input-group">
                        <label for="bloodGroup">Blood Group</label>
                        <select id="bloodGroup" required>
                            <option value="" disabled selected>Select blood group</option>
                            <option value="A+">A+</option>
                            <option value="A-">A-</option>
                            <option value="B+">B+</option>
                            <option value="B-">B-</option>
                            <option value="AB+">AB+</option>
                            <option value="AB-">AB-</option>
                            <option value="O+">O+</option>
                            <option value="O-">O-</option>
                        </select>
                    </div>
                </div>
                
                <div class="row-group">
                    <div class="input-group">
                        <label for="dob">Date of Birth</label>
                        <input type="date" id="dob" required>
                    </div>
                    <div class="input-group">
                        <label for="gender">Gender</label>
                        <select id="gender" required>
                            <option value="" disabled selected>Select gender</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                </div>
                
                <div class="row-group">
                    <div class="input-group">
                        <label for="emergency">Emergency Contact</label>
                        <input type="tel" id="emergency" required placeholder="Guardian/Relative number">
                    </div>
                    <div class="input-group">
                        <label for="legalIdType">Legal ID Type</label>
                        <select id="legalIdType" required>
                            <option value="" disabled selected>Select ID type</option>
                            <option value="Aadhaar">Aadhaar</option>
                            <option value="PAN">PAN Card</option>
                            <option value="Voter ID">Voter ID</option>
                            <option value="Driving License">Driving License</option>
                            <option value="Passport">Passport</option>
                        </select>
                    </div>
                </div>
                
                <div class="input-group">
                    <label for="legalIdNumber">Legal ID Number</label>
                    <input type="text" id="legalIdNumber" required placeholder="Enter your ID number">
                </div>
                
                <div class="input-group">
                    <label for="fullAddress">Full Address</label>
                    <textarea id="fullAddress" rows="3" required placeholder="Enter your complete address"></textarea>
                </div>

                <!-- SECTION 3: MEMBERSHIP & PAYMENT -->
                <div class="form-section-title">Membership Selection</div>
                
                <div class="input-group">
                    <label for="planSelect">Choose Your Plan</label>
                    <select id="planSelect" required>
                        <option value="starter">Starter Membership (Monthly) - ₹999</option>
                        <option value="power">Power Membership (Quarterly) - ₹2,499</option>
                        <option value="elite">Elite Membership (Half Yearly) - ₹4,499</option>
                        <option value="champion">Champion Membership (Yearly) - ₹7,999</option>
                    </select>
                </div>

                <div class="form-section-title" style="margin-top: 10px;">Payment Method</div>

                <div class="payment-method-group">
                    <label class="payment-option" id="optOnline">
                        <input type="radio" name="paymentMethod" id="payOnline" value="online" checked />
                        <span class="pm-icon">📲</span>
                        <div>
                            <strong>Pay Online (UPI)</strong>
                            <p>Instant payment via UPI, net banking, or cards.</p>
                        </div>
                    </label>
                    <label class="payment-option" id="optOffline">
                        <input type="radio" name="paymentMethod" id="payOffline" value="offline" />
                        <span class="pm-icon">🏦</span>
                        <div>
                            <strong>Offline Payment at Gym Counter</strong>
                            <p>Pay cash or card directly at RAW FITNESS GYM.</p>
                        </div>
                    </label>
                </div>

                <div class="terms-check">
                    <input type="checkbox" id="terms" required>
                    <label for="terms">I agree to the <a href="terms.html">Terms & Conditions</a>.</label>
                </div>
                
                <div id="registerMessage" class="form-message"></div>

                <button type="submit" class="register-btn" id="proceedBtn">Complete Registration →</button>
            </form>
            
            <div class="register-footer">
                <p>Already have an account? <a href="login.html">Log in here</a></p>
                <a href="index.html" class="back-link">← Cancel and Back to Home</a>
            </div>
        </div>
    </div>

    <script>
        const registerForm = document.getElementById('registerForm');
        const registerMessage = document.getElementById('registerMessage');

        function showRegisterMessage(text, isError = true) {
            registerMessage.textContent = text;
            registerMessage.style.color = isError ? '#ff6b6b' : '#7ce3a3';
            registerMessage.style.margin = '16px 0';
        }

        // Auto-select plan if passed via URL
        const urlParams = new URLSearchParams(window.location.search);
        const planKey = urlParams.get('plan');
        if(planKey) {
            const planSelect = document.getElementById('planSelect');
            for(let i=0; i<planSelect.options.length; i++) {
                if(planSelect.options[i].value === planKey) {
                    planSelect.selectedIndex = i;
                    break;
                }
            }
        }

        // Update button label based on payment method
        document.querySelectorAll('input[name="paymentMethod"]').forEach(radio => {
            radio.addEventListener('change', function() {
                const btn = document.getElementById('proceedBtn');
                if (this.value === 'offline') {
                    btn.textContent = 'Submit & Pay at Gym Counter →';
                    btn.style.background = '#1a6e3c';
                } else {
                    btn.textContent = 'Complete Registration →';
                    btn.style.background = '';
                }
            });
        });

        registerForm.addEventListener('submit', function(event) {
            event.preventDefault();
            
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            // 1. Validate Password
            if (password !== confirmPassword) {
                showRegisterMessage('Passwords do not match. Please try again.');
                return;
            }

            // 2. Check existing user
            const users = JSON.parse(localStorage.getItem('rawRegisteredUsers') || '[]');
            const exists = users.some((user) => user.email === email);
            if (exists) {
                showRegisterMessage('This email is already registered. Please log in instead.');
                return;
            }

            const paymentMethod = document.querySelector('input[name="paymentMethod"]:checked').value;
            const selectedPlan = document.getElementById('planSelect').value;

            // 3. Prepare Payloads
            const registerPayload = {
                type: 'register',
                name,
                email,
                password,
                createdAt: Date.now()
            };

            const membershipPayload = {
                type: 'membership',
                fullName: name,
                email: email,
                phone: document.getElementById('phone').value.trim(),
                bloodGroup: document.getElementById('bloodGroup').value,
                dob: document.getElementById('dob').value,
                gender: document.getElementById('gender').value,
                emergency: document.getElementById('emergency').value.trim(),
                legalIdType: document.getElementById('legalIdType').value,
                legalIdNumber: document.getElementById('legalIdNumber').value.trim(),
                fullAddress: document.getElementById('fullAddress').value.trim(),
                plan: selectedPlan,
                paymentMethod: paymentMethod,
                submittedAt: Date.now()
            };

            // 4. Save to LocalStorage
            users.unshift(registerPayload);
            localStorage.setItem('rawRegisteredUsers', JSON.stringify(users));

            const membershipEntries = JSON.parse(localStorage.getItem('rawMembershipEntries') || '[]');
            membershipEntries.unshift(membershipPayload);
            localStorage.setItem('rawMembershipEntries', JSON.stringify(membershipEntries));

            // Set current user session
            localStorage.setItem('currentUser', JSON.stringify({name, email}));

            // 5. Send to Google Sheets
            sendGoogleSheetRow(registerPayload);
            sendGoogleSheetRow(membershipPayload);

            showRegisterMessage('Registration successful! Processing...', false);

            // 6. Redirection
            setTimeout(() => {
                if (paymentMethod === 'offline') {
                    localStorage.setItem('postLoginRedirect', 'user-dashboard.html');
                    window.location.href = 'login.html?offline=1';
                } else {
                    window.location.href = 'payment.html?plan=' + selectedPlan;
                }
            }, 1000);
        });
    </script>
</body>
</html>
