<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raw Fitness Gym - Register</title>
    <link rel="stylesheet" href="register.css">
    <script src="google-sheets.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Barlow:wght@400;500;600&family=Bebas+Neue&display=swap" rel="stylesheet">
</head>
<body>
    <div class="register-container">
        <div class="register-card">
            <div class="register-header">
                <h2>Create Account</h2>
                <p>Join Raw Fitness Gym and start your journey today.</p>
            </div>
            <form id="registerForm" action="#" method="POST" class="register-form">
                <div class="input-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="Enter your full name" required>
                </div>
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Create a password" required>
                </div>
                <div class="input-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirm your password" required>
                </div>
                <button type="submit" class="register-btn">Sign Up</button>
            </form>
            <div id="registerMessage" class="form-message"></div>
            <div class="register-footer">
                <p>Already have an account? <a href="login.html">Log in here</a></p>
                <p class="footer-terms">View our <a href="terms.html">Terms & Conditions</a>.</p>
                <a href="index.html" class="back-link">← Back to Home</a>
            </div>
        </div>
    </div>

    <script>
        const registerForm = document.getElementById('registerForm');
        const registerMessage = document.getElementById('registerMessage');

        function showRegisterMessage(text, isError = true) {
            registerMessage.textContent = text;
            registerMessage.style.color = isError ? '#ff6b6b' : '#7ce3a3';
            registerMessage.style.margin = '16px 0';
        }

        registerForm.addEventListener('submit', function(event) {
            event.preventDefault();
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (password !== confirmPassword) {
                showRegisterMessage('Passwords do not match. Please try again.');
                return;
            }

            const users = JSON.parse(localStorage.getItem('rawRegisteredUsers') || '[]');
            const exists = users.some((user) => user.email === email);
            if (exists) {
                showRegisterMessage('This email is already registered. Please log in instead.');
                return;
            }

            users.unshift({
                name,
                email,
                password,
                createdAt: Date.now()
            });
            localStorage.setItem('rawRegisteredUsers', JSON.stringify(users));
            sendGoogleSheetRow({
              type: 'register',
              name,
              email,
              password,
              createdAt: Date.now()
            });
            localStorage.setItem('currentUser', JSON.stringify({name, email}));
            showRegisterMessage('Registration successful! Redirecting to membership...', false);
            setTimeout(() => {
              window.location.href = 'membership.html';
            }, 700);
        });
    </script>
</body>
</html>
